{% load tz %}
<!DOCTYPE html>
<html>
<head>
    <script src='https://cdn.jsdelivr.net/npm/chart.js'></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f5f5f5; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav { display: flex; gap: 15px; }
        .nav a { padding: 10px 20px; background-color: #4CAF50; color: white; text-decoration: none; border-radius: 3px; }
        .nav a:hover { background-color: #45a049; }
        .controls { background-color: white; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
        .control-group { margin-bottom: 12px; }
        label { display: inline-block; width: 120px; font-weight: bold; }
        select, input { padding: 8px; border: 1px solid #ddd; border-radius: 3px; }
        button { padding: 8px 16px; background-color: #4CAF50; color: white; border: none; border-radius: 3px; cursor: pointer; }
        button:hover { background-color: #45a049; }
        #c { background-color: white; padding: 20px; border-radius: 5px; }
        h2 { color: #333; margin: 0; }
    </style>
</head>
<body>
    <div class="header">
        <h2>IoT Dashboard - {{ device }}</h2>
        <div class="nav">
            <a href="/settings/">Beállítások</a>
            <a href="/sensor-names/">Szenzor nevek</a>
        </div>
    </div>
    <div class='controls'>
        <form method='get'>
            <div class='control-group'>
                <label>Eszköz:</label>
                <select name='device'>
                    {% for d in devices %}
                    <option value='{{ d }}' {% if d == device %}selected{% endif %}>{{ d }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class='control-group'>
                <label>Kezdés:</label>
                <input type='datetime-local' name='start_time' value='{{ start_time|slice:":16" }}'>
            </div>
            <div class='control-group'>
                <label>Vége:</label>
                <input type='datetime-local' name='end_time' value='{{ end_time|slice:":16" }}'>
            </div>
            <button type='submit'>Szűrés</button>
        </form>
    </div>
    <div style=" width: 100%; height: 600px;">
        <canvas id='SensorChart'></canvas>
    </div>
    <script>
        const raw = [{% for d in data %}{t:'{{ d.created_at|localtime|date:"Y-m-d H:i:s" }}',
            t1:{% if d.t1 is None %}null{% else %}{{ d.t1 }}{% endif %},
            t2:{% if d.t2 is None %}null{% else %}{{ d.t2 }}{% endif %},
            t3:{% if d.t3 is None %}null{% else %}{{ d.t3 }}{% endif %},
            h1:{% if d.h1 is None %}null{% else %}{{ d.h1 }}{% endif %},
            h2:{% if d.h2 is None %}null{% else %}{{ d.h2 }}{% endif %},
            h3:{% if d.h3 is None %}null{% else %}{{ d.h3 }}{% endif %}
        },{% endfor %}].reverse();
        new Chart(document.getElementById('SensorChart'), {
            type: 'line',
            data: {
                labels: raw.map(x => x.t),
                datasets: [
                    { label: '{{ sensor_names.t1|escapejs }} (°C)', data: raw.map(x => x.t1), borderColor: '#FF6384', tension: 0.1 },
                    { label: '{{ sensor_names.t2|escapejs }} (°C)', data: raw.map(x => x.t2), borderColor: '#36A2EB', tension: 0.1 },
                    { label: '{{ sensor_names.t3|escapejs }} (°C)', data: raw.map(x => x.t3), borderColor: '#FFCE56', tension: 0.1 }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { position: 'top' }
                },
                scales: {
                    y: { beginAtZero: true, grace:'10%', title: { display: true, text: 'Hőmérséklet (°C)' } },
                    x: { title: { display: true, text: 'Idő' } }
                }
            }
        });

        <!---->
        function hasFilter() {
            const params = new URLSearchParams(window.location.search);
            return params.has("start_time") || params.has("end_time");
        }

        if (!hasFilter()) {
            setInterval(() => {
                location.reload();
            }, 60000);
        }
    </script>
</body>
</html>
